name: iOS Build on Push

on:
  push:
    branches:
      - '**'

jobs:
  test:
    name: Run iOS Tests
    runs-on: macos-latest

    env:
      Destination: 'platform=iOS Simulator,arch=arm64,name=iPhone 17,OS=latest'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: List available simulators
        run: xcrun simctl list devices

      - name: Build Project
        run: |
          xcodebuild build-for-testing \
            -project wwWallet.xcodeproj \
            -scheme wwWallet \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "$Destination"

      - name: Run Tests
        run: |
          xcodebuild test-without-building \
            -project wwWallet.xcodeproj \
            -scheme wwWallet \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "$Destination" \
            -quiet
